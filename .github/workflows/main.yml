name: Publish new packages.

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}

      - name: Install reprepro
        run: sudo apt-get install -y --no-install-recommends reprepro

      - name: Import signing key and cache passphrase
        env:
          SIGNING_KEY: ${{ secrets.TRANSDEBIAN_REPO_SIGNING_KEY }}
          PASSPHRASE: ${{ secrets.TRANSDEBIAN_REPO_PASSPHRASE }}
        run: |
          echo "$SIGNING_KEY" | gpg --batch --import
          mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
          printf '%s\n' 'allow-loopback-pinentry' 'default-cache-ttl 7200' \
            >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent
          # Cache the passphrase in the agent via a dummy sign operation
          printf '%s' "$PASSPHRASE" | gpg --batch --pinentry-mode loopback \
            --passphrase-fd 0 -u 428AD1A0BA078ABB \
            --output /dev/null --sign /dev/null

      - name: Add packages to repository
        run: |
          shopt -s nullglob
          debs=(updates/*.deb)
          if [ "${#debs[@]}" -eq 0 ]; then
            echo "No packages to process."
            exit 0
          fi
          for distro in bionic focal jammy buster bullseye bookworm sid trixie; do
            for deb in "${debs[@]}"; do
              reprepro --ignore=wrongdistribution -b apt includedeb "$distro" "$deb" || true
            done
          done

      - name: Commit and push changes
        run: |
          find updates -name "*.deb" -delete
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apt/ updates/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update apt repository"
            git push
          fi

